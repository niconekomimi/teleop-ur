<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1160" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#F7F7FC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#EA580C"/>
    </marker>
    <style>
      .title { font: 700 34px 'DejaVu Sans', Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 400 16px 'DejaVu Sans', Arial, sans-serif; fill: #475569; }
      .layer { font: 700 18px 'DejaVu Sans', Arial, sans-serif; fill: #0F172A; }
      .box-title { font: 700 18px 'DejaVu Sans', Arial, sans-serif; fill: #0F172A; }
      .box-text { font: 400 14px 'DejaVu Sans', Arial, sans-serif; fill: #334155; }
      .small { font: 600 13px 'DejaVu Sans', Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="860" rx="24" fill="url(#bg)"/>

  <text x="90" y="78" class="title">teleop_control Architecture Overview</text>
  <text x="90" y="106" class="subtitle">Clean top-level view for README. Detailed runtime behavior stays in docs.</text>

  <rect x="70" y="140" width="1140" height="180" rx="28" fill="#EAF4FF" stroke="#B9D8FF"/>
  <rect x="70" y="352" width="1140" height="242" rx="28" fill="#FFF3E7" stroke="#FFD4A8"/>
  <rect x="70" y="626" width="1140" height="164" rx="28" fill="#EDF9EF" stroke="#B8E2C2"/>

  <text x="96" y="174" class="layer">GUI / Task Layer</text>
  <text x="96" y="386" class="layer">Core + ROS Runtime</text>
  <text x="96" y="660" class="layer">Hardware + External Systems</text>

  <g filter="url(#shadow)">
    <rect x="110" y="198" width="250" height="90" rx="20" fill="#FFFFFF"/>
    <text x="134" y="234" class="box-title">GUI Main Window</text>
    <text x="134" y="258" class="box-text">Operator entry point</text>
    <text x="134" y="278" class="box-text">start / stop / observe / configure</text>

    <rect x="390" y="198" width="250" height="90" rx="20" fill="#FFFFFF"/>
    <text x="414" y="234" class="box-title">GuiAppService</text>
    <text x="414" y="258" class="box-text">Process orchestration</text>
    <text x="414" y="278" class="box-text">driver / teleop / collector / inference</text>

    <rect x="670" y="198" width="250" height="90" rx="20" fill="#FFFFFF"/>
    <text x="694" y="234" class="box-title">ROS2Worker</text>
    <text x="694" y="258" class="box-text">GUI-to-ROS bridge</text>
    <text x="694" y="278" class="box-text">state subscription + service calls</text>

    <rect x="950" y="198" width="220" height="90" rx="20" fill="#FFFFFF"/>
    <text x="974" y="234" class="box-title">InferenceWorker</text>
    <text x="974" y="258" class="box-text">Model lifecycle</text>
    <text x="974" y="278" class="box-text">Qt signal output</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="110" y="410" width="230" height="120" rx="22" fill="#FFFFFF"/>
    <text x="134" y="446" class="box-title">SystemOrchestrator</text>
    <text x="134" y="470" class="box-text">phase + state rules</text>
    <text x="134" y="490" class="box-text">teleop / home / inference</text>

    <rect x="370" y="410" width="220" height="120" rx="22" fill="#FFFFFF"/>
    <text x="394" y="446" class="box-title">ActionMux</text>
    <text x="394" y="470" class="box-text">priority arbitration</text>
    <text x="394" y="490" class="box-text">SAFETY &gt; COMMANDER &gt; ...</text>

    <rect x="620" y="410" width="230" height="120" rx="22" fill="#FFFFFF"/>
    <text x="644" y="446" class="box-title">ControlCoordinator</text>
    <text x="644" y="470" class="box-text">shared control gateway</text>
    <text x="644" y="490" class="box-text">dispatch + guard rails</text>

    <rect x="880" y="410" width="290" height="120" rx="22" fill="#FFFFFF"/>
    <text x="904" y="446" class="box-title">teleop_control_node</text>
    <text x="904" y="470" class="box-text">Joy / MediaPipe / Quest3 input</text>
    <text x="904" y="490" class="box-text">limits + normalized ActionCommand</text>

    <rect x="170" y="552" width="240" height="120" rx="22" fill="#FFFFFF"/>
    <text x="194" y="588" class="box-title">robot_commander_node</text>
    <text x="194" y="612" class="box-text">Home / Home Zone</text>
    <text x="194" y="632" class="box-text">controller switch + trajectory</text>

    <rect x="450" y="552" width="220" height="120" rx="22" fill="#FFFFFF"/>
    <text x="474" y="588" class="box-title">SyncHub</text>
    <text x="474" y="612" class="box-text">synchronized observation</text>
    <text x="474" y="632" class="box-text">robot + camera + action</text>

    <rect x="700" y="552" width="220" height="120" rx="22" fill="#FFFFFF"/>
    <text x="724" y="588" class="box-title">RecorderService</text>
    <text x="724" y="612" class="box-text">HDF5 writer</text>
    <text x="724" y="632" class="box-text">demo lifecycle</text>

    <rect x="950" y="552" width="220" height="120" rx="22" fill="#FFFFFF"/>
    <text x="974" y="588" class="box-title">data_collector_node</text>
    <text x="974" y="612" class="box-text">SDK camera pull</text>
    <text x="974" y="632" class="box-text">preview + recording services</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="686" width="200" height="70" rx="18" fill="#FFFFFF"/>
    <text x="144" y="716" class="box-title">Joy / Quest3 / Cameras</text>
    <text x="144" y="738" class="box-text">human + sensor inputs</text>

    <rect x="370" y="686" width="210" height="70" rx="18" fill="#FFFFFF"/>
    <text x="394" y="716" class="box-title">UR Driver + MoveIt</text>
    <text x="394" y="738" class="box-text">servo / trajectory execution</text>

    <rect x="630" y="686" width="180" height="70" rx="18" fill="#FFFFFF"/>
    <text x="654" y="716" class="box-title">Gripper Driver</text>
    <text x="654" y="738" class="box-text">Robotiq / qbSoftHand</text>

    <rect x="860" y="686" width="150" height="70" rx="18" fill="#FFFFFF"/>
    <text x="884" y="716" class="box-title">HDF5 Demos</text>
    <text x="884" y="738" class="box-text">dataset output</text>

    <rect x="1060" y="686" width="120" height="70" rx="18" fill="#FFFFFF"/>
    <text x="1084" y="716" class="box-title">Real_IL</text>
    <text x="1084" y="738" class="box-text">inference</text>
  </g>

  <path d="M360 243H390" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <path d="M640 243H670" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <path d="M920 243H950" stroke="#2563EB" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

  <path d="M795 288V382" stroke="#EA580C" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowOrange)"/>
  <path d="M235 288V382" stroke="#EA580C" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowOrange)"/>

  <path d="M340 470H370" stroke="#EA580C" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowOrange)"/>
  <path d="M590 470H620" stroke="#EA580C" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowOrange)"/>
  <path d="M850 470H880" stroke="#EA580C" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowOrange)"/>

  <path d="M1025 530V544" stroke="#EA580C" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowOrange)"/>
  <path d="M810 530V544" stroke="#EA580C" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowOrange)"/>
  <path d="M560 530V544" stroke="#EA580C" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowOrange)"/>
  <path d="M300 530V544" stroke="#EA580C" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowOrange)"/>

  <path d="M220 686V678C220 656 238 638 260 638H410" stroke="#16A34A" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <path d="M475 686V678C475 652 496 632 522 632H620" stroke="#16A34A" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <path d="M720 686V678C720 652 741 632 767 632H700" stroke="#16A34A" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <path d="M920 686V678C920 652 899 632 873 632H810" stroke="#16A34A" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <path d="M1120 686V678C1120 640 1088 610 1050 610H1040" stroke="#16A34A" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

  <text x="825" y="337" class="small">GUI intent + ROS bridge</text>
  <text x="660" y="508" class="small">shared control path</text>
  <text x="910" y="780" class="subtitle">Static SVG is easier to control than a large Mermaid graph in README.</text>
</svg>
