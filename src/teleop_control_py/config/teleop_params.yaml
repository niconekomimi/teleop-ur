# teleop_control_node 行为层配置。
# 这里只放“如何遥操作”的参数，不放底层机械臂 / 夹爪 ROS 接口真值。

teleop_control_node:
  ros__parameters:
    # ==========================================================
    # 0) 画像绑定
    # ==========================================================
    robot_profile: "ur_servo_ur5"

    # ==========================================================
    # 1) 后端选择
    # ==========================================================
    # joy | mediapipe | quest3
    input_type: "joy"

    # robotiq | qbsofthand
    gripper_type: "robotiq"

    control_hz: 60.0

    # ==========================================================
    # 2) 机械臂输出与运动限幅
    # ==========================================================
    # 这里保留行为级开关和限幅。
    # target_frame_id / servo_twist_topic / tool_pose_topic /
    # start_servo_service / controller_manager_ns / controllers
    # 默认统一来自 robot_profile。

    auto_start_servo: true
    auto_switch_controllers: true
    startup_retry_period_sec: 1.0

    # 速度 / 加速度限幅。
    # 参考 ROS 官方 teleop_twist_joy 常见 xbox / ps3-holonomic 示例：
    # 常速 linear 常落在 0.4~0.7，angular 常落在 0.4~0.5，并配 enable/turbo。
    # 当前系统还没有 turbo 档，这里先迁一版“保守常速 + 更细中段”的手感来试。
    max_linear_vel: 2.0
    max_angular_vel: 3.0
    max_linear_accel: 6.0
    max_angular_accel: 12.0
    # 松手后回零时使用的加速度倍率。
    # 越小回零越慢、更柔和；越大回零越快。1.0 表示和正常加速同样快。
    zero_return_accel_scale: 3.0

    # ==========================================================
    # 3) Joy 手柄输入
    # ==========================================================
    joy_topic: "/joy"
    input_watchdog_timeout_sec: 0.2

    # linear | cubic
    joy_deadzone: 0.05
    joy_curve: "cubic"

    joy_deadman_enabled: false
    deadman_button: -1
    deadman_axis: 4
    deadman_axis_threshold: 0.5

    # Z 方向仅使用左右扳机控制：LT 上升，RT 下降。
    linear_x_axis: 0
    linear_y_axis: 1
    linear_z_axis: -1
    linear_z_up_axis: 4
    linear_z_down_axis: 5
    # Z 轴由扳机控制时单独降速，并在松手回弹时做“释放吸附到 0”。
    # 如果曾经是深按状态，只要检测到明显从峰值回落，就直接切 0，吃掉扳机慢回弹尾巴。
    linear_z_scale: 0.5
    linear_z_trigger_deadzone: 0.12
    linear_z_trigger_release_deadzone: 0.99
    linear_z_trigger_snap_release_threshold: 0.99
    linear_z_trigger_snap_release_drop: 0.99
    linear_z_zero_return_accel_scale: 9.0
    linear_axis_sign: [-1.0, -1.0, 1.0]

    angular_x_axis: 3
    angular_y_axis: 2
    angular_z_axis: -1
    angular_axis_sign: [-1.0, 1.0, 1.0]
    angular_z_positive_button: 1
    angular_z_negative_button: 0

    # gripper_axis >= 0 时优先使用轴控制。
    gripper_close_button: 5
    gripper_open_button: 4
    gripper_axis: -1
    gripper_axis_inverted: false

    # ==========================================================
    # 4) Quest 3 WebXR 输入
    # ==========================================================
    quest3_connected_topic: "/quest3/connected"
    quest3_left_pose_topic: "/quest3/left_controller/pose"
    quest3_right_pose_topic: "/quest3/right_controller/pose"
    quest3_joy_topic: "/quest3/input/joy"
    quest3_require_connected: true
    quest3_pose_timeout_sec: 0.3
    quest3_active_hand: "left"
    # Quest 控制器遥操作优先使用相对位姿 + clutch 的 target_pose 模式。
    # 这是比视觉手势更稳定的主流做法：按住 clutch 时记录手柄/机器人起点，
    # 再用手柄相对位姿持续驱动 TCP 目标位姿。
    quest3_motion_mode: "target_pose"
    quest3_deadzone: 0.005
    quest3_linear_scale: 1.0
    quest3_angular_scale: 1.0
    quest3_position_linear_gain: 10.0
    quest3_position_angular_gain: 8.0
    quest3_max_linear_vel: 2.8
    quest3_max_angular_vel: 5.0
    quest3_max_linear_accel: 14.0
    quest3_max_angular_accel: 24.0
    quest3_linear_axis_mapping: [0, 2, 1]
    quest3_angular_axis_mapping: [1, 0, 2]
    quest3_linear_axis_sign: [-1.0, 1.0, 1.0]
    quest3_angular_axis_sign: [-1.0, -1.0, 1.0]
    quest3_orientation_mode: "hand_relative"
    quest3_orientation_axis_mapping: [1, 0, 2]
    quest3_orientation_axis_sign: [-1.0, -1.0, 1.0]
    # Quest 控制器本身 6DoF 跟踪已经很稳，默认不要再在输入层做低通，
    # 避免明显拖手。若后面只想抑制轻微抖动，再打开这个开关。
    quest3_enable_input_smoothing: false
    quest3_smoothing_alpha: 0.45
    # Quest2ROS 风格的相对 frame 重置。
    # 长按组合键后，把当前控制器姿态定义为新的相对参考系，
    # 后续 clutch / pose delta 都基于这个参考系解释。
    quest3_frame_reset_enabled: true
    # active_hand: 只允许当前控制手做 frame reset；both: 左右手都可单独重置。
    quest3_frame_reset_scope: "active_hand"
    quest3_frame_reset_hold_sec: 0.75
    # false: 只重置平移零点，不让姿态零点把后续平移轴也一起旋转，避免斜向漂移。
    # true: 使用 Quest2ROS 式 full-frame 重映射，平移和姿态都会进入新参考系。
    quest3_frame_reset_rotate_position: false
    quest3_left_frame_reset_buttons: [4, 5]   # X + Y
    quest3_right_frame_reset_buttons: [10, 11]  # A + B
    quest3_clutch_filter_enabled: true
    quest3_clutch_engage_confirm_sec: 0.02
    quest3_clutch_release_confirm_sec: 0.02
    quest3_clutch_axis_threshold: 0.15
    quest3_left_clutch_axis: 1
    quest3_right_clutch_axis: 7
    quest3_left_clutch_button: 1
    quest3_right_clutch_button: 7
    quest3_left_trigger_axis: 0
    quest3_right_trigger_axis: 6
    quest3_left_trigger_button: 0
    quest3_right_trigger_button: 6
    quest3_gripper_requires_clutch: true
    quest3_gripper_axis_inverted: false

    # ==========================================================
    # 5) MediaPipe 输入
    # ==========================================================
    # 直接订阅手势识别输入图像，在 teleop 节点内完成 MediaPipe 手部跟踪。
    mediapipe_input_topic: "/camera/camera/color/image_raw"
    mediapipe_topic: ""
    mediapipe_depth_topic: "/camera/camera/aligned_depth_to_color/image_raw"
    mediapipe_camera_info_topic: "/camera/camera/aligned_depth_to_color/camera_info"
    mediapipe_camera_driver: "realsense"
    mediapipe_camera_serial_number: ""
    mediapipe_enable_depth: false
    mediapipe_use_sdk_camera: true
    # velocity: 手势位移直接映射为速度；target_pose: 手势位移映射为目标位姿。
    mediapipe_motion_mode: "target_pose"
    mediapipe_deadzone: 0.02
    mediapipe_linear_scale: 2.8
    mediapipe_angular_scale: 1.0
    mediapipe_position_linear_gain: 7.0
    mediapipe_position_angular_gain: 5.0
    mediapipe_max_linear_vel: 2.8
    mediapipe_max_angular_vel: 5.0
    mediapipe_max_linear_accel: 10.0
    mediapipe_max_angular_accel: 18.0
    mediapipe_linear_axis_mapping: [0, 1, 2]
    mediapipe_angular_axis_mapping: [0, 1, 2]
    mediapipe_linear_axis_sign: [1.0, 1.0, 1.0]
    mediapipe_angular_axis_sign: [1.0, 1.0, 1.0]
    mediapipe_hand_position_source: "depth"
    mediapipe_orientation_mode: "lock"
    mediapipe_orientation_axis_mapping: [0, 1, 2]
    mediapipe_orientation_axis_sign: [1.0, 1.0, 1.0]
    mediapipe_depth_min_m: 0.1
    mediapipe_depth_max_m: 2.0
    mediapipe_depth_unit_scale: 0.001
    mediapipe_smoothing_alpha: 0.45
    mediapipe_gripper_open_dist_px: 100.0
    mediapipe_gripper_close_dist_px: 20.0
    mediapipe_gripper_open_dist_m: 0.10
    mediapipe_gripper_close_dist_m: 0.03
    mediapipe_gripper_metric_hold_sec: 0.25
    mediapipe_gripper_requires_deadman: true
    mediapipe_deadman_filter_enabled: true
    mediapipe_deadman_engage_confirm_sec: 0.10
    mediapipe_deadman_release_confirm_sec: 0.03
    mediapipe_space_deadman_backend: "pynput"
    mediapipe_space_deadman_hold_sec: 0.3
    mediapipe_show_debug_window: true

    # ==========================================================
    # 6) 夹爪输出
    # ==========================================================
    # gripper_type 负责上层选择具体末端执行器。
    # 详细接口默认值（command topic / action / service / quantization）
    # 统一来自 robot_profile.grippers。

# MoveIt Servo 覆盖项。
# 这些值会在 control_system.launch.py 里作为 moveit_servo.* 参数注入，
# 用来覆盖 upstream ur_moveit_config 的默认 Servo 手感，而不修改外部库源码。
moveit_servo:
  ros__parameters:
    system_latency_compensation: 0.0
    low_latency_mode: false

# Robotiq 硬件启动参数。
# 这些值会由 control_system.launch.py 解析后传给 robotiq_2f_gripper_launch.py，
# open/close_threshold 会被临时写成运行时 YAML，再传给上游节点。
robotiq_gripper:
  ros__parameters:
    serial_port: "/dev/robotiq_gripper"
    baudrate: 115200
    timeout: 1.0
    action_timeout: 20
    slave_address: 9
    fake_hardware: false
    rviz2: false
    open_threshold: 0.3
    close_threshold: -0.3

# Quest 3 WebXR bridge 启动参数。
# control_system.launch.py 在 input_type:=quest3 且 launch_quest3_bridge:=auto 时会自动启动它。
quest3_webxr_bridge_node:
  ros__parameters:
    # WebXR / Vuer websocket server
    vuer_host: "0.0.0.0"
    vuer_port: 8012
    vuer_client_domain: "https://vuer.ai"

    # Quest 应访问本机的哪个局域网 IP。
    # 双网卡场景建议明确写成电脑 Wi-Fi 的 IPv4，避免误选到 UR5 有线网卡。
    advertised_host: "192.168.137.227"

    # 默认使用本地自签名证书，通过 https/wss 提供 WebXR。
    auto_generate_self_signed_cert: true
    tls_workdir: "/tmp/teleop_control_py/quest3_webxr_tls"

    # 如果未来通过公网 TLS 代理暴露 websocket，可在这里放完整 wss 地址。
    public_wss_url: ""

    ssl_cert_file: ""
    ssl_key_file: ""

    stream_key: "quest3-controllers"
    stream_left: true
    stream_right: true

    publish_rate_hz: 90.0
    stale_timeout_sec: 0.5
    frame_id: "quest3_world"

    left_pose_topic: "/quest3/left_controller/pose"
    right_pose_topic: "/quest3/right_controller/pose"
    left_matrix_topic: "/quest3/left_controller/matrix"
    right_matrix_topic: "/quest3/right_controller/matrix"
    joy_topic: "/quest3/input/joy"
    connected_topic: "/quest3/connected"
    debug_log_all_vuer_events: false
