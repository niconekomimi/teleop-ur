# data_collector_node 行为层配置。
# 这里只放“如何采集与写盘”的参数，不放底层机械臂 / 夹爪 ROS 接口真值。

data_collector:
  ros__parameters:
    # ==========================================================
    # 0) 画像绑定
    # ==========================================================
    robot_profile: "ur_servo_ur5"

    # ==========================================================
    # 1) 输出与采样
    # ==========================================================
    output_path: "/home/rvl/collect_datasets_ws/data/libero_demos.hdf5"
    record_fps: 10.0
    # <= 0 时关闭周期统计输出。
    stats_period_sec: 2.0

    # ==========================================================
    # 2) 相机来源
    # ==========================================================
    # realsense | oakd
    global_camera_source: "realsense"
    wrist_camera_source: "oakd"
    global_camera_serial_number: ""
    wrist_camera_serial_number: ""
    # false: 默认只开 RGB；true: 启用 depth，并固定走对齐后的 RGBD 管道。
    global_camera_enable_depth: false
    wrist_camera_enable_depth: false

    # ==========================================================
    # 3) 机器人状态输入
    # ==========================================================
    # 这里只保留采集侧的时间有效性约束。
    # joint_states_topic / tool_pose_topic / servo_twist_topic /
    # joint_names 默认统一来自 robot_profile。

    # ==========================================================
    # 4) 夹爪状态选择
    # ==========================================================
    # robotic_gripper | qbsofthand
    end_effector_type: "robotic_gripper"

    # 留空则按 end_effector_type 自动选择。
    gripper_state_topic: "/gripper/cmd"

    # 详细末端状态 topic 默认统一来自 robot_profile.grippers。
    # gripper_state_topic 非空时，优先使用这里的覆盖值。

    # true: 丢帧；false: 缺失时回退为 0.0。
    require_gripper: false

    # ==========================================================
    # 5) 时间戳有效性
    # ==========================================================
    pose_max_age_sec: 0.05
    joint_max_age_sec: 0.20
    command_max_age_sec: 0.2
    gripper_max_age_sec: 0.5
    image_max_age_sec: 0.10
    camera_pair_max_skew_sec: 0.15
    # 位姿时间戳为零时，使用当前采样时刻作为参考。
    pose_stamp_zero_is_ref: true

    # ==========================================================
    # 6) 图像处理与写盘
    # ==========================================================
    preview_fps: 30.0
    preview_api_enabled: true
    preview_api_host: "127.0.0.1"
    preview_api_port: 8765
    preview_api_jpeg_quality: 80

    # 节点内部会强制使用 224。
    obs_image_size: 224

    # lzf | gzip | none
    image_compression: "gzip"

    # 队列满时会丢帧，不阻塞回调线程。
    queue_maxsize: 400
    writer_batch_size: 32
    writer_flush_every_n: 200

    # ==========================================================
    # 7) 可选键盘控制
    # ==========================================================
    # r: 开始录制，s: 停止录制，q: 退出；需要回车确认。
    enable_keyboard: false
